<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmos AI & Anime</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* PRELOADER STYLE */
    #preloader {
      position: fixed; inset: 0; background: #0a0a0a; z-index: 9999;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-around; height: 100vh; width: 100vw; overflow: hidden;
      transition: opacity 0.5s ease;
    }
    .classic-brand { text-align: center; letter-spacing: 5px; width: 100%; }
    .classic-brand h1 { font-size: clamp(20px, 7vw, 40px); font-weight: 300; margin: 0; color: #ffffff; opacity: 0.9; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
    .square-container { display: flex; justify-content: center; align-items: center; height: 120px; width: 100%; }
    .loader-sq { position: relative; width: 80px; height: 80px; transform: rotate(45deg); }
    .loader-square { position: absolute; width: 24px; height: 24px; margin: 2px; background: white; animation: square-anim 10s ease-in-out infinite both; }
    @keyframes square-anim {
      0%, 10.5%, 100% { left: 0; top: 0; }
      12.5%, 23% { left: 28px; top: 0; }
      25%, 35.5% { left: 56px; top: 0; }
      37.5%, 48% { left: 56px; top: 28px; }
      50%, 60.5% { left: 28px; top: 28px; }
      62.5%, 73% { left: 28px; top: 56px; }
      75%, 85.5% { left: 0; top: 56px; }
      87.5%, 98% { left: 0; top: 28px; }
    }
    .loader-square:nth-child(1) { animation-delay: -1.42s; }
    .loader-square:nth-child(2) { animation-delay: -2.85s; }
    .loader-square:nth-child(3) { animation-delay: -4.28s; }
    .loader-square:nth-child(4) { animation-delay: -5.71s; }
    .loader-square:nth-child(5) { animation-delay: -7.14s; }
    .loader-square:nth-child(6) { animation-delay: -8.57s; }
    .loader-square:nth-child(7) { animation-delay: -10s; }
    
    .text-card { background-color: rgba(255, 255, 255, 0.03); padding: 12px 20px; border-radius: 12px; display: flex; align-items: center; justify-content: center; width: 90%; max-width: 350px; border: 1px solid rgba(255, 255, 255, 0.05); }
    .text-loader { color: #7c7c7c; font-weight: 400; font-size: clamp(14px, 4vw, 18px); height: 26px; display: flex; align-items: center; overflow: hidden; white-space: nowrap; font-family: 'Poppins', sans-serif; }
    .words { position: relative; margin-left: 8px; height: 26px; }
    .word { display: block; height: 26px; line-height: 26px; color: #956afa; animation: cosmos_spin 12s cubic-bezier(0.76, 0, 0.24, 1) infinite; }
    @keyframes cosmos_spin {
      0%, 15% { transform: translateY(0); }
      20%, 35% { transform: translateY(-26px); }
      40%, 55% { transform: translateY(-52px); }
      60%, 75% { transform: translateY(-78px); }
      80%, 95% { transform: translateY(-104px); }
      100% { transform: translateY(0); }
    }

    /* ASOSIY SAYT STYLES */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background-color: #0f0f0f; color: #fff; overflow-x: hidden; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background-color: #0f0f0f; position: sticky; top: 0; z-index: 1000; height: 60px; }
    .logo { display: flex; align-items: center; cursor: pointer; flex-shrink: 0; }
    .logo-img { width: 32px; height: 32px; border-radius: 50%; background: #A47CF3; margin-right: 8px; overflow: hidden; }
    .logo-img img { width: 100%; height: 100%; object-fit: cover; }
    .search-box { flex: 1; max-width: 600px; display: flex; margin: 0 10px; transition: 0.3s; }
    .search-box input { width: 100%; background: #121212; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 20px 0 0 20px; outline: none; font-size: 14px; }
    .search-box button { background: #222; border: 1px solid #333; padding: 0 15px; border-radius: 0 20px 20px 0; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .user-profile { width: 40px; height: 40px; border-radius: 50%; background: #333; overflow: hidden; border: 2px solid #A47CF3; cursor: pointer; flex-shrink: 0; }
    .user-profile img { width: 100%; height: 100%; object-fit: cover; }

    .main-wrapper { display: flex; flex-direction: row; }
    .sidebar { width: 240px; padding: 12px; height: calc(100vh - 60px); position: sticky; top: 60px; flex-shrink: 0; }
    .sidebar-item { display: flex; align-items: center; padding: 12px 15px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; color: #aaa; }
    .sidebar-item i { margin-right: 20px; }
    .sidebar-item:hover, .sidebar-item.active { background: #272727; color: #fff; }
    .content { flex: 1; padding: 15px; width: 100%; min-height: 100vh; }
    .tags-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
    .tag { background: #272727; padding: 8px 16px; border-radius: 20px; cursor: pointer; white-space: nowrap; border: none; color: #fff; font-size: 13px; flex-shrink: 0; }
    .tag.active { background: #fff !important; color: #000 !important; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { cursor: pointer; transition: 0.2s; background: #161616; border-radius: 12px; overflow: hidden; width: 100%; }
    .thumb { width: 100%; aspect-ratio: 16/9; position: relative; background: #222; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .info { padding: 12px; }
    .info h3 { font-size: 14px; margin-bottom: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .info p { font-size: 12px; color: #aaa; }
    
    @media (max-width: 768px) {
      .sidebar { position: fixed; bottom: 0; left: 0; top: auto; width: 100%; height: 60px; background: #0f0f0f; flex-direction: row; justify-content: space-around; padding: 0; border-top: 1px solid #222; z-index: 2000; display: flex; }
      .sidebar-item { flex-direction: column; padding: 8px; font-size: 10px; margin-bottom: 0; flex: 1; border-radius: 0; justify-content: center; }
      .sidebar-item i { margin-right: 0; margin-bottom: 4px; font-size: 20px; }
      .content { padding: 10px; padding-bottom: 80px; }
      .grid { grid-template-columns: 1fr; }
    }

    .modal { display: none; position: fixed; inset: 0; background: #0f0f0f; z-index: 3000; overflow-y: auto; }
    .modal-body { display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; padding: 10px; gap: 15px; position: relative; }
    .poster-container { width: 100%; aspect-ratio: 16/9; position: relative; border-radius: 12px; overflow: hidden; background: #000; }
    .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #A47CF3; color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: bold; }
    .qism-item { display: flex; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; background: #1a1a1a; }
    .qism-item.active { background: #272727; border-left: 4px solid #A47CF3; }
    .qism-thumb { width: 80px; aspect-ratio: 16/9; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .qism-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .close-btn { position: absolute; top: 10px; right: 10px; font-size: 28px; cursor: pointer; z-index: 3100; color: #fff; background: rgba(255,255,255,0.1); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
    
    .ai-container { text-align: center; max-width: 500px; margin: 40px auto; padding: 20px; }
    .ai-btn { background: linear-gradient(to right,#A47CF3,#683FEA); color: white; padding: 15px 30px; border-radius: 30px; cursor: pointer; display: inline-block; margin-top: 20px; font-weight: bold; }
    .loader { border: 3px solid #222; border-top: 3px solid #A47CF3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="preloader">
    <div class="classic-brand"><h1>AFNA x COSMOS</h1></div>
    <div class="square-container"><div class="loader-sq">
        <div class="loader-square"></div><div class="loader-square"></div>
        <div class="loader-square"></div><div class="loader-square"></div>
        <div class="loader-square"></div><div class="loader-square"></div>
        <div class="loader-square"></div>
    </div></div>
    <div class="text-card"><div class="text-loader">
        <span>Cosmos Bu:</span>
        <div class="words">
            <span class="word">ZO'R</span><span class="word">ARZON</span>
            <span class="word">TEZLIK</span><span class="word">SIFAT</span>
            <span class="word">SIZ NIMA DEB O'YLAYSIZ?</span>
        </div>
    </div></div>
</div>

<header>
  <div class="logo" onclick="location.reload()">
    <div class="logo-img"><img src="https://i.ibb.co/wZPrsZLw/image.png"></div>
    <strong>Cosmos</strong>
  </div>
  <div class="search-box" id="searchContainer">
    <input type="text" id="searchInput" placeholder="Qidiruv..." onkeyup="handleSearch()">
    <button><i class="material-icons">search</i></button>
  </div>
  <div class="user-profile" id="userPhoto"><img src="https://i.ibb.co/wZPrsZLw/image.png" id="pfp"></div>
</header>

<div class="main-wrapper">
  <div class="sidebar">
    <div class="sidebar-item active" id="btn-home" onclick="goHome()"><i class="material-icons">home</i> <span>Bosh sahifa</span></div>
    <div class="sidebar-item" id="btn-ai" onclick="openAISearch()"><i class="material-icons">image_search</i> <span>AI Qidiruv</span></div>
    <div class="sidebar-item" id="btn-history" onclick="showHistory()"><i class="material-icons">history</i> <span>Tarix</span></div>
  </div>

  <div class="content">
    <div class="tags-bar" id="tags">
      <button class="tag active" onclick="filter('Yangi animelar')">Yangi animelar</button>
      <button class="tag" onclick="filter('Mashhur')">Mashhur</button>
      <button class="tag" onclick="filter('Sarguzasht')">Sarguzasht</button>
      <button class="tag" onclick="filter('Fantaziya')">Fantaziya</button>
      <button class="tag" onclick="filter('Romantika')">Romantika</button>
      <button class="tag" onclick="filter('Drama')">Drama</button>
      <button class="tag" onclick="filter('Komediya')">Komediya</button>
      <button class="tag" onclick="filter('Isekai')">Isekai</button>
      <button class="tag" onclick="filter('Psixologik')">Psixologik</button>
      <button class="tag" onclick="filter('Horror')">Horror</button>
      <button class="tag" onclick="filter('Hayotdan lavha')">Hayotdan lavha</button>
      <button class="tag" onclick="filter('Sport')">Sport</button>
      <button class="tag" onclick="filter('Magik')">Magik</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="videoModal" class="modal">
  <div class="modal-body">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="video-main">
      <div class="poster-container">
        <img id="modalPoster" src="" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.6;">
        <button class="play-overlay" id="mainPlayBtn"><i class="material-icons">play_arrow</i> Ko'rish</button>
      </div>
      <h2 id="vTitle" style="margin-top:15px; font-size: 18px; padding: 0 5px;"></h2>
    </div>
    <div class="video-side">
      <h4 style="margin-bottom:15px; border-bottom: 1px solid #333; padding-bottom: 10px;">Qismlar</h4>
      <div id="playlistItems"></div>
    </div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  if(tg.initDataUnsafe?.user?.photo_url) {
      document.getElementById('pfp').src = tg.initDataUnsafe.user.photo_url;
  }

  const GITHUB_DATA_URL = "https://raw.githubusercontent.com/UPL-ANIME/annn/main/anim.json";
  const DB_URL = "https://test-82a8a-default-rtdb.firebaseio.com/mytube";
  const MY_MEMORY_URL = "https://api.mymemory.translated.net/get";
  const IMGBB_API_KEY = "43f7134694d09a98117a9def92e57c5b";

  let USER_IP = "guest";
  let allData = [];
  let currentKey = null;
  let currentMode = "home";

  async function loadData() {
    try {
      const [ipRes, gitRes, viewRes] = await Promise.all([
        fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({ip: 'guest'})),
        fetch(GITHUB_DATA_URL).then(r => r.text()),
        fetch(`${DB_URL}/views.json`).then(r => r.json()).catch(() => ({}))
      ]);
      USER_IP = ipRes.ip.replace(/\./g, '_');
      allData = JSON.parse(gitRes);
      const views = viewRes || {};
      allData = allData.map(item => ({ ...item, view: views[item.id] || 0 }));
      
      // Default: Yangi animelar (eng oxirgisi birinchi)
      const sorted = [...allData].reverse();
      render(sorted);
      
      const startParam = tg.initDataUnsafe?.start_param;
      if(startParam) {
        openVideo(startParam);
      } else {
        const hash = window.location.hash.substring(1);
        if(hash) openVideo(hash);
      }

      setTimeout(() => {
        document.getElementById('preloader').style.opacity = '0';
        setTimeout(() => document.getElementById('preloader').style.display = 'none', 500);
      }, 1000);
    } catch (e) {
      document.getElementById('grid').innerHTML = '<div style="padding:20px; color:red; text-align:center;">Xato!</div>';
    }
  }

  function render(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = list.map(item => `
      <div class="card" onclick="openVideo('${item.id}')">
        <div class="thumb">
          <img src="${item.thumb}" loading="lazy">
          <div class="duration">${item.view || 0} ko'rish</div>
        </div>
        <div class="info"><h3>${item.title}</h3><p>${item.turkum?.join(', ') || 'Anime'}</p></div>
      </div>
    `).join('');
  }

  function filter(tag) {
    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    
    if (tag === 'Yangi animelar') {
      const sorted = [...allData].reverse();
      render(sorted);
    } else if (tag === 'Mashhur') {
      const popular = [...allData].sort((a, b) => (b.view || 0) - (a.view || 0));
      render(popular);
    } else {
      const filtered = allData.filter(i => i.turkum && i.turkum.includes(tag));
      render(filtered);
    }
  }

  async function openVideo(key) {
    const item = allData.find(x => x.id === key);
    if (!item) return;
    currentKey = key;
    document.getElementById('modalPoster').src = item.thumb;
    
    document.getElementById('playlistItems').innerHTML = (item.qismlar || []).map((q, i) => {
      const pThumb = q.thumb || item.thumb;
      return `
        <div class="qism-item" id="q-${i}" onclick="setPart('${btoa(encodeURIComponent(q.link))}', '${btoa(encodeURIComponent(q.nom))}', 'q-${i}', '${btoa(encodeURIComponent(pThumb))}')">
          <div class="qism-thumb"><img src="${pThumb}"></div>
          <div class="qism-info"><h4>${q.nom}</h4><span>Qism ${i+1}</span></div>
        </div>
      `;
    }).join('');

    if(item.qismlar?.length) {
      const f = item.qismlar[0];
      setPart(btoa(encodeURIComponent(f.link)), btoa(encodeURIComponent(f.nom)), 'q-0', btoa(encodeURIComponent(f.thumb || item.thumb)));
    }
    document.getElementById('videoModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  function setPart(sL, sN, id, sT) {
    const link = decodeURIComponent(atob(sL)), nom = decodeURIComponent(atob(sN)), thumb = decodeURIComponent(atob(sT));
    document.querySelectorAll('.qism-item').forEach(el => el.classList.remove('active'));
    document.getElementById(id)?.classList.add('active');
    document.getElementById('vTitle').innerText = nom;
    document.getElementById('modalPoster').src = thumb;

    document.getElementById('mainPlayBtn').onclick = () => {
      const item = allData.find(x => x.id === currentKey);
      if(item) {
        item.view = (item.view || 0) + 1;
        fetch(`${DB_URL}/views/${currentKey}.json`, { method: 'PUT', body: JSON.stringify(item.view) });
      }

      const plat = tg.platform;
      if(plat === "desktop" || plat === "macos" || plat === "web") {
          tg.openTelegramLink(link);
      } else {
          window.open(`${link}`, "_blank");
      }

      const histItem = { key: currentKey, title: item.title, thumb: item.thumb, time: Date.now() };
      fetch(`${DB_URL}/history/${USER_IP}/${currentKey}.json`, { method: 'PUT', body: JSON.stringify(histItem) });
    };
  }

  async function showHistory() {
    currentMode = "history";
    updateUI('btn-history');
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div class="loader" style="display:block"></div>';
    
    try {
      const res = await fetch(`${DB_URL}/history/${USER_IP}.json`);
      const data = await res.json();
      const list = data ? Object.values(data).sort((a,b) => b.time - a.time) : [];
      
      if(list.length === 0) {
        grid.innerHTML = '<p style="text-align:center; padding:20px; color:#aaa;">Tarix bo\'sh</p>';
      } else {
        grid.innerHTML = list.map(item => `
          <div class="card" onclick="openVideo('${item.key}')">
            <div class="thumb"><img src="${item.thumb}"></div>
            <div class="info"><h3>${item.title}</h3><p>Ko'rilgan</p></div>
          </div>
        `).join('');
      }
    } catch { 
      grid.innerHTML = '<p style="text-align:center; padding:20px;">Xato!</p>'; 
    }
  }

  function openAISearch() {
    currentMode = "ai";
    updateUI('btn-ai');
    document.getElementById('grid').innerHTML = `
      <div class="ai-container">
        <h2>Anime AI Qidiruv</h2>
        <label class="ai-btn" for="fileInput">Rasm tanlash</label>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="processAI(event)">
        <div class="loader" id="aiLoader"></div>
        <div id="aiResult" style="margin-top:20px;"></div>
      </div>
    `;
  }

  async function processAI(e) {
    const file = e.target.files[0];
    if(!file) return;
    const loader = document.getElementById('aiLoader'), result = document.getElementById('aiResult');
    loader.style.display = 'block'; result.innerHTML = '';
    
    try {
      const formData = new FormData();
      formData.append("image", file);
      const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
      const imgJson = await imgRes.json();
      
      const traceRes = await fetch(`https://api.trace.moe/search?url=${encodeURIComponent(imgJson.data.url)}`);
      if (!traceRes.ok) throw new Error("AI qidiruv xizmati javob bermadi");
      
      const traceJson = await traceRes.json();
      if (!traceJson.result || traceJson.result.length === 0) throw new Error("Anime topilmadi");
      
      const anime = traceJson.result[0];
      const similarity = anime.similarity * 100;
      const color = similarity < 90 ? 'red' : '#A47CF3';
      
      let rawTitle = anime.filename.replace(/\[.*?\]|\.mp4|\.mkv|\d+|\(.*?\)|_/g, ' ').trim();
      const uzTitle = await translate(rawTitle);
      const story = `Bu anime sarguzashtlarga boy bo'lib, unda qahramonlarning hayoti va o'zgacha dunyosi tasvirlanadi. Ushbu qismda siz kutilmagan voqealarga guvoh bo'lasiz.`;

      loader.style.display = 'none';
      result.innerHTML = `
        <div class="card" style="margin:auto; background:#1a1a1a; max-width:400px; text-align: left;">
          <img src="${anime.image}" style="width:100%">
          <div class="info">
            <h3 style="color:#A47CF3">${uzTitle}</h3>
            <p style="color:${color}; font-weight:bold;">Aniqlik: ${similarity.toFixed(1)}%</p>
            <p style="margin-top:10px; color:#ccc; font-size:12px;"><b>Hikoya:</b> ${story}</p>
            <button class="tag active" style="width:100%; margin-top:10px;" onclick="goHomeSearch('${rawTitle}')">Saytdan topish</button>
          </div>
        </div>`;
    } catch (err) { loader.style.display = 'none'; result.innerHTML = "Xato yuz berdi!"; }
  }

  async function translate(text) {
    try {
      const res = await fetch(`${MY_MEMORY_URL}?q=${encodeURIComponent(text)}&langpair=en|uz`);
      const data = await res.json();
      return data.responseData?.translatedText || text;
    } catch { return text; }
  }

  function updateUI(activeId) {
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    document.getElementById(activeId).classList.add('active');
    
    const search = document.getElementById('searchContainer');
    const tags = document.getElementById('tags');
    
    if (activeId === 'btn-home') {
      search.style.display = 'flex';
      tags.style.display = 'flex';
    } else {
      search.style.display = 'none';
      tags.style.display = 'none';
    }
  }

  function goHomeSearch(t) { goHome(); document.getElementById('searchInput').value = t; handleSearch(); }
  function goHome() { currentMode = "home"; updateUI('btn-home'); render([...allData].reverse()); }
  function handleSearch() {
    const v = document.getElementById('searchInput').value.toLowerCase();
    render(allData.filter(i => i.title.toLowerCase().includes(v)));
  }
  function closeModal() { document.getElementById('videoModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

  loadData();
</script>
</body>
</html>
